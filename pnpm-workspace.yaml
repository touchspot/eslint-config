  jotai: ^2.20.0
  knip: ^5.88.1
  lint-staged: ^16.4.0
  next: ^16.2.6
  prettier: ^3.8.3
  react: ^19.2.6
  react-dom: ^19.2.6
  tailwindcss: ^4.3.0
  ts-patch: ^3.3.0
  turbo: ^2.9.14
  typescript: ^5.9.3
