  typescript-transform-paths: ^3.5.6
  vite-tsconfig-paths: ^6.1.1
  vitest: ^4.1.7
  zx: ^8.8.5

catalogMode: strict

cleanupUnusedCatalogs: true

ignoredBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver

linkWorkspacePackages: true

peerDependencyRules:
  allowedVersions:
    eslint-plugin-react>eslint: ^10

publicHoistPattern:
  - "@typescript/*"

strictPeerDependencies: true

updateConfig:
  ignoreDependencies:
    - "@types/node"
